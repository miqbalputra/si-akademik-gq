<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline - Nilai Sekolah</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            color: #d97706;
            font-size: 48px;
            margin-bottom: 8px;
        }
        p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.5;
        }
        a {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: #d97706;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Offline</h1>
        <p>Koneksi internet tidak tersedia. Aplikasi nilai sekolah memerlukan koneksi untuk mengakses data.</p>
        <a href="/">Coba Lagi</a>
    </div>

</html>
